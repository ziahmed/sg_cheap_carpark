name: Build and deploy to Azure App Service

# Triggers on push to main, and lets you run it manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Change this to whatever you name your Azure Web App
  AZURE_WEBAPP_NAME: sg-cheap-carpark

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build client + server bundle
        run: npm run build

      - name: Strip devDependencies for a lean runtime image
        run: npm prune --omit=dev

      - name: Assemble deployment package
        # server.cjs is bundled with esbuild --packages=external, so the
        # *runtime* still needs node_modules (production deps only) and
        # package.json present alongside dist/ at the site root.
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r node_modules deploy/node_modules
          cp package.json deploy/package.json

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
